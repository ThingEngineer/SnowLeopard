; PlatformIO Project Configuration File for ESP32-C3 Fridge Controller
; Project Name: SnowLeopard

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.partitions = partitions-ota.csv

; Serial Monitor & Upload Settings
monitor_speed = 115200
; upload_port = /dev/cu.usbmodem14201
upload_speed = 115200
monitor_port = /dev/cu.usbmodem14201

; Vital Build Flags for ESP32-C3 Built-in USB and custom I2C Pins
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_VARIANT_SET_SDA=8
    -DARDUINO_VARIANT_SET_SCL=9

; Library Dependencies
lib_deps =
    olikraus/U8g2 @ ^2.35.30
    adafruit/Adafruit AHTX0 @ ^2.0.5
    stevemarple/AsyncDelay @ ^1.1.2
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    esphome/AsyncTCP-esphome @ ^2.1.4
    ; If SoftwareWire fails on ESP32-C3, try:
    ; tobozo/ESP32-I2C-Software-Wire @ ^1.0.0
