name: Build Firmware Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    if: github.ref_name != 'develop'
    runs-on: ubuntu-latest
    env:
      PIO_ENV: esp32-c3-devkitm-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Build firmware
        run: pio run --environment "$PIO_ENV"

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp ".pio/build/$PIO_ENV/firmware.bin" "release-artifacts/snowleopard-${RELEASE_TAG}.bin"
          shasum -a 256 "release-artifacts/snowleopard-${RELEASE_TAG}.bin" > "release-artifacts/snowleopard-${RELEASE_TAG}.sha256.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-artifacts/*.bin
            release-artifacts/*.sha256.txt
